# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rewrite root-relative paths as relative paths
        run: |
          python3 <<'PYEOF'
          import glob
          import json
          import posixpath
          import re
          from urllib.parse import urlsplit, urlunsplit

          print("Rewriting root-relative internal paths to deployment-safe relative paths")

          def to_relative_path(path, current_dir):
              if not path.startswith('/') or path.startswith('//'):
                  return path

              parsed = urlsplit(path)
              clean_path = parsed.path
              target = '.' if clean_path == '/' else clean_path.lstrip('/')
              start = current_dir or '.'
              relative = posixpath.relpath(target, start=start)

              if clean_path == '/':
                  relative = './' if start == '.' else posixpath.relpath('.', start=start)

              return urlunsplit(('', '', relative, parsed.query, parsed.fragment))

          def rewrite_html(filepath, content):
              current_dir = posixpath.dirname(filepath.replace('\\', '/'))

              def replacer(match):
                  attr, path = match.group(1), match.group(2)
                  return f'{attr}="{to_relative_path(path, current_dir)}"'

              return re.sub(r'(href|src|action)="(/[^\"]*)"', replacer, content)

          def rewrite_manifest(filepath, content):
              try:
                  data = json.loads(content)
              except Exception:
                  return content

              manifest_dir = posixpath.dirname(filepath.replace('\\', '/'))
              for key in ('start_url', 'scope', 'id'):
                  value = data.get(key, '')
                  if isinstance(value, str) and value.startswith('/') and not value.startswith('//'):
                      data[key] = to_relative_path(value, manifest_dir)

              icons = data.get('icons')
              if isinstance(icons, list):
                  for icon in icons:
                      src = icon.get('src')
                      if isinstance(src, str) and src.startswith('/') and not src.startswith('//'):
                          icon['src'] = to_relative_path(src, manifest_dir)

              return json.dumps(data, indent=2, ensure_ascii=False) + '\n'

          for filepath in glob.glob('**/*.html', recursive=True):
              parts = filepath.replace('\\', '/').split('/')
              if any(part.startswith('.') for part in parts):
                  continue
              try:
                  with open(filepath, encoding='utf-8', errors='replace') as handle:
                      original = handle.read()
                  updated = rewrite_html(filepath, original)
                  if updated != original:
                      with open(filepath, 'w', encoding='utf-8') as handle:
                          handle.write(updated)
                      print(f"  patched {filepath}")
              except Exception as error:
                  print(f"  error {filepath}: {error}")

          for filepath in glob.glob('**/manifest.json', recursive=True):
              parts = filepath.replace('\\', '/').split('/')
              if any(part.startswith('.') for part in parts):
                  continue
              try:
                  with open(filepath, encoding='utf-8') as handle:
                      original = handle.read()
                  updated = rewrite_manifest(filepath, original)
                  if updated != original:
                      with open(filepath, 'w', encoding='utf-8') as handle:
                          handle.write(updated)
                      print(f"  patched {filepath}")
              except Exception as error:
                  print(f"  error {filepath}: {error}")

          print("Done.")
          PYEOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
